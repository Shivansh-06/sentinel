services:
  app:
    build: .
    container_name: sentinel_app
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy      # was service_started — now waits for redis to be ready
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: on-failure

  db:
    image: postgres:16-alpine
    container_name: sentinel_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sentinel_redis
    ports:
      - "6379:6379"
    healthcheck:                        # added — now other services wait for redis to accept connections
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build: .
    container_name: sentinel_worker
    volumes:
      - ./app:/app/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy      # was service_started
    command: rq worker ingestion --url redis://redis:6379/0
    restart: on-failure                 # added — if worker crashes on startup it will retry

volumes:
  postgres_data: